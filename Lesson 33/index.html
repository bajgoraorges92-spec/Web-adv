<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <form onsubmit="return validation()" method="POST">
            <div class="name_container">
                <label id="name" for="name">Name:</label>
                <input type="text" name="name" id="name">
                <span id="name_error">Please enter a valid Name</span>
            </div>
            <br>

            <div class="age_container">
                <label id="age" for="age">Age:</label>
                <input type="number" name="age" id="age">
                <span id="age_error">Please enter a valid Age</span>
            </div>
            <br>

            <div class="city_container">
                <label id="city" for="city">City:</label>
                <select name="" id="">
                    <option value="" selected></option>
                    <option value="Prishtina">Prishtina</option>
                    <option value="Peja">Peja</option>
                    <option value="Gjakova">Gjakova</option>
                </select>
                <span id="city_error">Please select a city</span>
            </div>
            <br>

            <button type="submit" name="submit">Submit</button>
        </form>








    <script src="main.js"></script>
</body>
</html>
